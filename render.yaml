databases:
  - name: value-analyst-db
    databaseName: value_analyst
    user: admin

services:
  - type: web
    name: value-analyst-web
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && gunicorn app:app -b 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: value-analyst-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
